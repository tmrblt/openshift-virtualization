#Credential: cluster-admin
- name: Step 2 - Secure and Limit Namespace
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    actual_user: "{{ awx_user_name }}"
    target_group: "group1" 
  tasks:
    # 1. Grant Admin permissions to the user who requested and created the project
    - name: Create Immutable RoleBinding for the Authenticated User (Admin)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: project-admin-binding
            namespace: "{{ project_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: user-project-admin 
          subjects:
            - kind: User
              name: "{{ actual_user }}"
              apiGroup: rbac.authorization.k8s.io

    # 2. Grant Read-Only (Viewer) permissions to the entire associated team/group
    - name: Create RoleBinding for the Associated Group (Viewer)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: project-group-viewer-binding
            namespace: "{{ project_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: user-project-viewer
          subjects:
            - kind: Group
              name: "{{ target_group }}" 
              apiGroup: rbac.authorization.k8s.io
