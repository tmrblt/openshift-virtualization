- name: Step 1 - Create Namespace
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    actual_user: "{{ awx_user_name }}"
    billing_group: "g1-provisioner"
  tasks:
    - name: Pre-check - Ensure user identity is captured
      fail:
        msg: "User identity could not be determined."
      when: actual_user is not defined or actual_user == ""

    - name: Create Isolated Namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ project_name }}"
            labels:
              local-group: "{{ billing_group }}"
              provisioned-via: "AAP-Portal"
            annotations:
              openshift.io/requester: "{{ actual_user }}"

    - name: Apply ResourceQuota (Guardrails)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: default-quota
            namespace: "{{ project_name }}"
          spec:
            hard:
              cpu: "10"
              memory: 40Gi
              requests.storage: "100Gi"

    - name: Apply LimitRange
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-limits
            namespace: "{{ project_name }}"
          spec:
            limits:
              - default:
                  cpu: "2"
                  memory: 4Gi
                defaultRequest:
                  cpu: "1"
                  memory: 2Gi
                type: Container
